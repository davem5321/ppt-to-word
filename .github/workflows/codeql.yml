name: "CodeQL"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "30 5 * * 1"

jobs:
  detect-languages:
    name: Detect Languages
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect CodeQL-supported languages
        id: set-matrix
        run: |
          languages=()
          # JavaScript / TypeScript
          if find . -name '*.js' -o -name '*.ts' -o -name '*.jsx' -o -name '*.tsx' | grep -q -v node_modules; then
            languages+=("javascript")
          fi
          # Python
          if find . -name '*.py' | grep -q .; then
            languages+=("python")
          fi
          # Java / Kotlin
          if find . -name '*.java' -o -name '*.kt' | grep -q .; then
            languages+=("java")
          fi
          # C# (.NET)
          if find . -name '*.cs' | grep -q .; then
            languages+=("csharp")
          fi
          # Go
          if find . -name '*.go' | grep -q .; then
            languages+=("go")
          fi
          # Ruby
          if find . -name '*.rb' | grep -q .; then
            languages+=("ruby")
          fi
          # C / C++
          if find . -name '*.c' -o -name '*.cpp' -o -name '*.h' -o -name '*.hpp' | grep -q .; then
            languages+=("cpp")
          fi
          # Swift
          if find . -name '*.swift' | grep -q .; then
            languages+=("swift")
          fi

          if [ ${#languages[@]} -eq 0 ]; then
            echo "No CodeQL-supported languages detected."
            echo "matrix={\"language\":[]}" >> "$GITHUB_OUTPUT"
          else
            json=$(printf '%s\n' "${languages[@]}" | jq -R . | jq -s -c '{language: .}')
            echo "matrix=$json" >> "$GITHUB_OUTPUT"
          fi

  analyze:
    name: Analyze (${{ matrix.language }})
    needs: detect-languages
    if: ${{ fromJson(needs.detect-languages.outputs.matrix).language[0] != null }}
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-languages.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # Uses the default query suite. For more coverage, uncomment:
          # queries: security-and-quality

      # Autobuild attempts to build compiled languages (Java, C#, Go, C/C++, Swift).
      # For interpreted languages (JS/TS, Python, Ruby), no build step is needed.
      # If autobuild fails for your project, replace this step with your manual build commands.
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
